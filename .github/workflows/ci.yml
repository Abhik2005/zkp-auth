name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first — downstream packages (server, client, react) resolve
      # @zkp-auth/core via workspace:* which points to dist/. Without building
      # core first, tsc cannot find its type declarations and emits TS2307.
      - name: Build
        run: pnpm build

      # Typecheck runs after build so all workspace dist/ folders exist.
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
