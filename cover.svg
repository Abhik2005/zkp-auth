<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <!-- Background -->
  <rect width="1000" height="420" fill="#0d1117"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="420" fill="url(#grid)"/>

  <!-- Circuit trace lines (left side) -->
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.18">
    <polyline points="40,80 40,160 100,160 100,200"/>
    <polyline points="40,200 100,200 100,260 160,260"/>
    <polyline points="160,260 160,320 220,320"/>
    <circle cx="40"  cy="80"  r="3" fill="#58a6ff"/>
    <circle cx="100" cy="200" r="3" fill="#58a6ff"/>
    <circle cx="160" cy="260" r="3" fill="#58a6ff"/>
    <circle cx="220" cy="320" r="3" fill="#58a6ff"/>
    <polyline points="60,340 60,280 120,280 120,240"/>
    <circle cx="60"  cy="340" r="3" fill="#58a6ff"/>
    <circle cx="120" cy="240" r="3" fill="#58a6ff"/>
  </g>

  <!-- Circuit trace lines (right side) -->
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.18">
    <polyline points="960,80 960,160 900,160 900,200"/>
    <polyline points="960,200 900,200 900,260 840,260"/>
    <polyline points="840,260 840,320 780,320"/>
    <circle cx="960" cy="80"  r="3" fill="#58a6ff"/>
    <circle cx="900" cy="200" r="3" fill="#58a6ff"/>
    <circle cx="840" cy="260" r="3" fill="#58a6ff"/>
    <circle cx="780" cy="320" r="3" fill="#58a6ff"/>
    <polyline points="940,340 940,280 880,280 880,240"/>
    <circle cx="940" cy="340" r="3" fill="#58a6ff"/>
    <circle cx="880" cy="240" r="3" fill="#58a6ff"/>
  </g>

  <!-- Lock icon — centered, above title -->
  <!-- Lock body -->
  <rect x="471" y="68" width="58" height="46" rx="6" ry="6" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
  <!-- Lock shackle -->
  <path d="M 484 68 L 484 52 Q 484 36 500 36 Q 516 36 516 52 L 516 68"
        fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole circle -->
  <circle cx="500" cy="88" r="7" fill="#58a6ff"/>
  <!-- Keyhole slot -->
  <rect x="497" y="88" width="6" height="10" rx="2" fill="#58a6ff"/>

  <!-- Accent line under lock -->
  <line x1="460" y1="130" x2="540" y2="130" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text
    x="500" y="195"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-0.5">I built ZKP auth so passwords</text>
  <text
    x="500" y="241"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-0.5">never touch your server</text>

  <!-- Accent underline -->
  <rect x="340" y="256" width="320" height="3" rx="1.5" fill="#58a6ff" opacity="0.7"/>

  <!-- Subtitle -->
  <text
    x="500" y="300"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="2">Zero-Knowledge Proof Authentication</text>

  <!-- Tag pills -->
  <rect x="354" y="324" width="88" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="398" y="342" font-family="'Courier New', Courier, monospace" font-size="13" fill="#58a6ff" text-anchor="middle">#security</text>

  <rect x="452" y="324" width="96" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="342" font-family="'Courier New', Courier, monospace" font-size="13" fill="#58a6ff" text-anchor="middle">#typescript</text>

  <rect x="558" y="324" width="88" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="602" y="342" font-family="'Courier New', Courier, monospace" font-size="13" fill="#58a6ff" text-anchor="middle">#webdev</text>

  <!-- Bottom-right metadata -->
  <text
    x="980" y="405"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#484f58"
    text-anchor="end"
    letter-spacing="0.5">@zkp-auth • npm • typescript</text>

  <!-- Top-left subtle bracket decoration -->
  <text x="28" y="56" font-family="'Courier New', Courier, monospace" font-size="28" fill="#58a6ff" opacity="0.25">{</text>
  <text x="952" y="56" font-family="'Courier New', Courier, monospace" font-size="28" fill="#58a6ff" opacity="0.25">}</text>
</svg>
